name: Godot Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Godot
        uses: firebelley/setup-godot@v1
        with:
          version: "4.6.1"
          use-dotnet: false

      - name: Run test_shop.gd
        run: godot --headless -s addons/gut/gut_cmdln.gd -gfile=res://test/test_shop.gd -gexit
