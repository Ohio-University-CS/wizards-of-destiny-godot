name: Godot Unit Tests

on:
  push:
    branches: [ "levelselect" ]
  pull_request:
    branches: [ "levelselect" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Check out your repository
      - uses: actions/checkout@v4

      # 2️⃣ Download and set up Godot (headless) from GitHub releases
      - name: Install Godot
        run: |
          wget https://github.com/godotengine/godot/releases/download/3.5.2-stable/Godot_v3.5.2-stable_linux_headless.64.zip -O godot.zip
          unzip godot.zip -d godot
          chmod +x godot/Godot_v3.5.2-stable_linux_headless.64

      # 3️⃣ Run your unit tests
      - name: Run Godot unit tests
        run: |
          ./godot/Godot_v3.5.2-stable_linux_headless.64 --headless --script test/test_level_select.gd
