name: Godot CI - Unit Tests

on:
  push:
    branches: [ "deckselect" ]
  pull_request:
    branches: [ "deckselect" ]
  workflow_dispatch:

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      # Checkout your repo
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Download Godot (Linux version for GitHub Actions)
      - name: Download Godot
        run: |
          wget https://downloads.tuxfamily.org/godotengine/4.2/Godot_v4.2-stable_linux.x86_64.zip
          unzip Godot_v4.2-stable_linux.x86_64.zip
          chmod +x Godot_v4.2-stable_linux.x86_64

      # Run your unit tests
      - name: Run Unit Tests
        run: |
          ./Godot_v4.2-stable_linux.x86_64 --headless -s res://test/deckselecttest.gd
